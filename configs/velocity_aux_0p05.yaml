seed: 42

data:
  train_paths: []
  val_paths: []

  train_file_list: processed_dataset/manifests/train_manifest.jsonl
  val_file_list: processed_dataset/manifests/val_manifest.jsonl

  train_data_dir:
  val_data_dir:

  stats_path: processed_dataset/stats/stats.json
  val_split: 0.0
  frame_dim: 65
  fps: 50
  source_fps_if_assumed: 120
  history_len: 20
  pred_len: 10

training:
  batch_size: 512
  epochs: 5000
  train_samples_per_epoch: 8192
  val_samples_per_epoch: 1024
  random_window_sampling: true
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  velocity_loss_weight: 0.05
  quaternion_loss_weight: 0.00001
  continuity_loss_weight: 0.0001
  auxiliary_max_timestep: 200
  checkpoint_dir: checkpoints/transformer_pred_len10_fps120_velaux0p05_normseam_{date}
  resume: false
  use_wandb: false
  device: cuda

diffusion:
  num_train_timesteps: 1000
  num_inference_steps: 50
  beta_schedule: squaredcos_cap_v2
  prediction_type: epsilon
  clip_sample: false

model:
  architecture: transformer
  dim: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  condition_encoder: transformer
  condition_summary: flatten
  down_dims: [256, 512, 1024]
  kernel_size: 3
  n_groups: 8
  cond_predict_scale: false
